name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'packages/wot-relay/**'
      - 'packages/wot-vault/**'
      - 'packages/wot-profiles/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      # Unabhaengige Service-Builds: ein fehlschlagender Service darf die anderen
      # nicht abbrechen (relay-first-Deploy braucht relay/profiles auch wenn vault hakt).
      fail-fast: false
      matrix:
        include:
          # relay/profiles sind self-contained (Context = Package-Dir)
          - package: wot-relay
            image: relay
            context: packages/wot-relay
            file: packages/wot-relay/Dockerfile
          - package: wot-profiles
            image: profiles
            context: packages/wot-profiles
            file: packages/wot-profiles/Dockerfile
          # vault baut @web_of_trust/core aus dem Workspace → Context = Repo-Root
          - package: wot-vault
            image: vault
            context: .
            file: packages/wot-vault/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
